name: 'Terraform CI/CD'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # OCI API key + config: required for the OCI Object Storage backend.
      - name: 'Create OCI Config Directory'
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_USER_OCID }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}" >> ~/.oci/config
          echo "region=us-ashburn-1" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config

      - name: 'Create OCI API Key File'
        run: |
          echo "${{ secrets.OCI_API_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      # Backend config is written from secrets. The var files
      # (services.tfvars, terraform.tfvars) are committed to the repo.
      - name: 'Write backend.tfvars'
        run: |
          cat > backend.tfvars <<EOF
          bucket      = "${{ secrets.BACKEND_BUCKET }}"
          namespace   = "${{ secrets.BACKEND_NAMESPACE }}"
          key         = "cloudflare/terraform.tfstate"
          region      = "${{ secrets.BACKEND_REGION }}"
          tenancy     = "${{ secrets.OCI_TENANCY_OCID }}"
          user        = "${{ secrets.OCI_USER_OCID }}"
          fingerprint = "${{ secrets.OCI_FINGERPRINT }}"
          EOF

      - name: Terraform Init
        run: terraform init -backend-config=backend.tfvars

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -var-file=services.tfvars -var-file=terraform.tfvars
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}

      - name: Update Pull Request
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  apply:
    name: 'Terraform Apply'
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 'Create OCI Config Directory'
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_USER_OCID }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}" >> ~/.oci/config
          echo "region=us-ashburn-1" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config

      - name: 'Create OCI API Key File'
        run: |
          echo "${{ secrets.OCI_API_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: 'Write backend.tfvars'
        run: |
          cat > backend.tfvars <<EOF
          bucket      = "${{ secrets.BACKEND_BUCKET }}"
          namespace   = "${{ secrets.BACKEND_NAMESPACE }}"
          key         = "cloudflare/terraform.tfstate"
          region      = "${{ secrets.BACKEND_REGION }}"
          tenancy     = "${{ secrets.OCI_TENANCY_OCID }}"
          user        = "${{ secrets.OCI_USER_OCID }}"
          fingerprint = "${{ secrets.OCI_FINGERPRINT }}"
          EOF

      - name: Terraform Init
        run: terraform init -backend-config=backend.tfvars

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -var-file=services.tfvars -var-file=terraform.tfvars
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}

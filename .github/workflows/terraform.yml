name: 'Terraform CI/CD'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # OCI API key + config: required for the OCI Object Storage backend.
      # Only the private key is a real secret. tenancy/user/fingerprint and
      # bucket/namespace/region are identifiers, not secrets.
      - name: 'Create OCI Config'
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=ocid1.user.oc1..aaaaaaaap7wsfug2hriywx53scpxrgah7g2ekuh2u45s6xnobiunkwpywt4a
          fingerprint=89:6c:5a:df:21:c7:61:5f:29:97:50:db:5a:1b:19:f0
          tenancy=ocid1.tenancy.oc1..aaaaaaaa3gi23m2ydmg7xa46xsae4wa2mmcmkshncwgt7zldhc3eamb3ovzq
          region=us-ashburn-1
          key_file=~/.oci/oci_api_key.pem
          EOF

      - name: 'Create OCI API Key File'
        run: |
          if [ -z "$OCI_API_PRIVATE_KEY" ]; then
            echo "::error::OCI_API_PRIVATE_KEY secret is empty. Add it in Settings → Secrets."
            exit 1
          fi
          echo "$OCI_API_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
        env:
          OCI_API_PRIVATE_KEY: ${{ secrets.OCI_API_PRIVATE_KEY }}

      - name: 'Write backend.tfvars'
        run: |
          cat > backend.tfvars <<'EOF'
          bucket      = "bucket-darylemb-20260125"
          namespace   = "idkw4f4zgz2v"
          key         = "cloudflare/terraform.tfstate"
          region      = "us-ashburn-1"
          EOF

      - name: Terraform Init
        run: terraform init -backend-config=backend.tfvars

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -var-file=services.tfvars -var-file=terraform.tfvars
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Update Pull Request
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  apply:
    name: 'Terraform Apply'
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 'Create OCI Config'
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=ocid1.user.oc1..aaaaaaaap7wsfug2hriywx53scpxrgah7g2ekuh2u45s6xnobiunkwpywt4a
          fingerprint=89:6c:5a:df:21:c7:61:5f:29:97:50:db:5a:1b:19:f0
          tenancy=ocid1.tenancy.oc1..aaaaaaaa3gi23m2ydmg7xa46xsae4wa2mmcmkshncwgt7zldhc3eamb3ovzq
          region=us-ashburn-1
          key_file=~/.oci/oci_api_key.pem
          EOF

      - name: 'Create OCI API Key File'
        run: |
          echo "$OCI_API_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
        env:
          OCI_API_PRIVATE_KEY: ${{ secrets.OCI_API_PRIVATE_KEY }}

      - name: 'Write backend.tfvars'
        run: |
          cat > backend.tfvars <<'EOF'
          bucket      = "bucket-darylemb-20260125"
          namespace   = "idkw4f4zgz2v"
          key         = "cloudflare/terraform.tfstate"
          region      = "us-ashburn-1"
          EOF

      - name: Terraform Init
        run: terraform init -backend-config=backend.tfvars

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -var-file=services.tfvars -var-file=terraform.tfvars
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

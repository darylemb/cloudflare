# Template — fill in the token from `terraform output -raw tunnel_token` and apply manually.
# DO NOT commit the real secret. Use SOPS, sealed-secrets, or apply from your local machine.
apiVersion: v1
kind: Secret
metadata:
  name: tunnel-credentials
  namespace: cloudflare
type: Opaque
stringData:
  token: "PASTE_TUNNEL_TOKEN_HERE"
